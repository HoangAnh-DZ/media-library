<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <!-- VẪN GIỮ NGUYÊN CSS GỐC CỦA ANH -->
  <link rel="stylesheet" href="./css/auth.css">
  
  <!-- CSS CHỈ DÀNH RIÊNG CHO BÉ GẤU SHIBA -->
  <style>
    /* Ép bảng đăng nhập của anh có vị trí để đặt gấu lên trên */
    .auth-box {
      position: relative !important;
      margin-top: 100px !important; /* Tạo khoảng trống phía trên màn hình để đặt gấu */
    }

    .svg-container {
      width: 110px; /* Đã thu nhỏ gọn gàng lại */
      height: 110px;
      position: absolute;
      top: -70px; /* Kéo gấu lên cao để không đè vào chữ Đăng nhập */
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none; /* Tránh click nhầm vào gấu */
    }

    .svg-container svg {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 5px solid white; /* Viền trắng mỏng lại cho cân đối */
      background: #e2e8f0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    /* Animation Tay che mắt */
    #pawL, #pawR {
      transform-origin: center bottom;
      transform: translateY(100px); /* Giấu tay ở dưới */
      transition: transform 0.4s cubic-bezier(0.25, 1.2, 0.5, 1);
    }
    .svg-container.cover-eyes #pawL { transform: translate(25px, -85px) rotate(15deg); }
    .svg-container.cover-eyes #pawR { transform: translate(-25px, -85px) rotate(-15deg); }
  </style>
</head>
<body>

<div class="auth-box">
  
  <!-- === THÊM KHUNG GẤU SHIBA SVG VÀO ĐÂY === -->
  <div class="svg-container" id="shibaContainer">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <clipPath id="circleMask"><circle cx="100" cy="100" r="100" /></clipPath>
      <g clip-path="url(#circleMask)">
        <rect width="200" height="200" fill="#e2e8f0" />
        <!-- Áo -->
        <path d="M 40 220 Q 100 130 160 220" fill="#4f46e5" />
        
        <!-- Đầu gấu -->
        <g id="head" style="transition: transform 0.1s ease-out;">
          <path d="M 50 80 L 35 25 L 85 55 Z" fill="#F59E0B" stroke="#D97706" stroke-width="2" stroke-linejoin="round"/>
          <path d="M 150 80 L 165 25 L 115 55 Z" fill="#F59E0B" stroke="#D97706" stroke-width="2" stroke-linejoin="round"/>
          <path d="M 50 70 L 45 35 L 75 55 Z" fill="#FEF08A" />
          <path d="M 150 70 L 155 35 L 125 55 Z" fill="#FEF08A" />
          <circle cx="100" cy="95" r="50" fill="#F59E0B" />
          <path d="M 50 95 C 50 145 100 145 100 145 C 100 145 150 145 150 95 C 150 70 120 75 100 85 C 80 75 50 70 50 95 Z" fill="#FFFFFF" />
          
          <g id="eyes" style="transition: transform 0.1s ease-out;">
            <circle cx="75" cy="85" r="6" fill="#0F172A" />
            <circle cx="125" cy="85" r="6" fill="#0F172A" />
            <circle cx="73" cy="83" r="2" fill="#FFFFFF" />
            <circle cx="123" cy="83" r="2" fill="#FFFFFF" />
          </g>
          
          <ellipse cx="100" cy="105" rx="8" ry="5" fill="#0F172A" />
          <path id="mouth" d="M 90 115 Q 100 125 110 115" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/>
        </g>
  
        <!-- Hai tay -->
        <g id="pawL">
          <path d="M 30 220 C 30 140 75 140 75 220" fill="#F59E0B" stroke="#D97706" stroke-width="2" />
          <path d="M 40 155 L 40 170 M 52 150 L 52 165 M 64 155 L 64 170" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
        </g>
        <g id="pawR">
          <path d="M 170 220 C 170 140 125 140 125 220" fill="#F59E0B" stroke="#D97706" stroke-width="2" />
          <path d="M 160 155 L 160 170 M 148 150 L 148 165 M 136 155 L 136 170" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
        </g>
      </g>
    </svg>
  </div>
  <!-- === KẾT THÚC KHUNG GẤU SHIBA === -->

  <!-- FORM VÀ LOGIC GIỮ NGUYÊN 100% CỦA ANH -->
  <h2>Đăng nhập</h2>

  <input id="emailInput" type="email" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Mật khẩu">

  <button type="button" onclick="login()">Đăng nhập</button>

  <div class="auth-links">
    <a href="./forgot.html">Quên mật khẩu?</a>
    <a href="./register.html">Tạo tài khoản</a>
  </div>
</div>

<script>
// === THÊM LOGIC CHUYỂN ĐỘNG CHO GẤU ===
const head = document.getElementById('head');
const eyes = document.getElementById('eyes');
const mouth = document.getElementById('mouth');
const svgCont = document.getElementById('shibaContainer');
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');

// Gõ Email -> Gấu liếc theo text
emailInput.addEventListener('focus', () => {
  mouth.setAttribute('d', 'M 95 118 Q 100 118 105 118'); // Mím môi
  updateHeadPosition();
});
emailInput.addEventListener('input', updateHeadPosition);
emailInput.addEventListener('blur', () => {
  head.style.transform = `translate(0px, 0px)`;
  eyes.style.transform = `translate(0px, 0px)`;
  mouth.setAttribute('d', 'M 90 115 Q 100 125 110 115'); // Cười lại
});

function updateHeadPosition() {
  let len = Math.min(emailInput.value.length, 30);
  let moveX = (len / 30) * 30 - 15; 
  head.style.transform = `translate(${moveX}px, 10px)`; 
  eyes.style.transform = `translate(${moveX * 0.3}px, 2px)`; 
}

// Bấm Mật khẩu -> Gấu che mắt
passwordInput.addEventListener('focus', () => {
  head.style.transform = `translate(0px, -5px)`; 
  mouth.setAttribute('d', 'M 95 118 Q 100 120 105 118'); 
  svgCont.classList.add('cover-eyes');
});
passwordInput.addEventListener('blur', () => {
  head.style.transform = `translate(0px, 0px)`;
  mouth.setAttribute('d', 'M 90 115 Q 100 125 110 115');
  svgCont.classList.remove('cover-eyes');
});


// === API ĐĂNG NHẬP GIỮ NGUYÊN 100% CỦA ANH ===
const API = "https://media-library-backend.onrender.com";

async function login() {
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value.trim();

  if (!email || !password) {
    alert("Vui lòng nhập email và mật khẩu");
    return;
  }

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Đăng nhập thất bại");
      return;
    }

    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "index.html";
  } catch (e) {
    alert("Không kết nối được server");
  }
}
</script>
</body>
</html>
